        /* SEARCH */
        .search-section { padding:24px 0 0; }

        .search-icon {

            font-size:1.1rem; color:var(--text-muted); pointer-events:none;

        .search-clear {
            position:absolute; right:44px; top:50%; transform:translateY(-50%);
            background:none; border:none; color:var(--text-muted);
            cursor:pointer; font-size:1.2rem; display:none; padding:4px 8px;
            border-radius:50%; transition:var(--transition-fast); line-height:1;

        .search-clear.visible { display:block; }
        .search-clear:hover { color:var(--text-primary); background:var(--border); }

        /* CATEGORY CHIPS */
        .category-section { padding:20px 0 8px; }
        .category-scroll {
            display:flex; gap:12px; overflow-x:auto; padding-bottom:10px;
            scroll-behavior:smooth; -webkit-overflow-scrolling:touch; white-space:nowrap;

        .category-chip {

            border:1.5px solid var(--border); border-radius:30px; cursor:pointer;

            transition:var(--transition); user-select:none; white-space:nowrap;
            font-family:var(--font-main);

        .category-chip:hover {
            background:var(--bg-tertiary); color:#fff;
            border-color:var(--accent); transform:translateY(-2px);
            box-shadow:var(--shadow-hover);

        .category-chip--active {
            background:var(--accent); color:#0a0a12;
            border-color:var(--accent); font-weight:700;
            box-shadow:0 0 28px var(--accent-glow);

                    ]

                    providers: [

                    providers: [

                    providers: [

                {

                    providers: [
                        { name: 'Uni-Identity', risk: 'MEDIUM', desc: 'Uni series for IDV.' }
                    ]

            ];

            // ---------- STATE ----------
            let state = {
                view: 'home',
                currentGameId: null,
                searchQuery: '',
                activeCategory: 'semua'
            };

            // ---------- DOM ELEMENTS ----------
            const viewHome = document.getElementById('view-home');
            const viewDetail = document.getElementById('view-detail');
            const searchInput = document.getElementById('searchInput');
            const searchClearBtn = document.getElementById('searchClearBtn');
            const categoryScroll = document.getElementById('categoryScroll');
            const productGrid = document.getElementById('productGrid');
            const filterCount = document.getElementById('filterCount');
            const featuredScroll = document.getElementById('featuredScroll');
            const detailContent = document.getElementById('detailContent');
            const toast = document.getElementById('toast');

            // ---------- HELPERS ----------
            function generateRatingSold(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = (hash << 5) - hash + str.charCodeAt(i);
                    hash |= 0;
                }
                const rating = (4.0 + (Math.abs(hash % 100) / 100)).toFixed(1);
                const sold = Math.abs(hash % 4500) + 500;
                return { rating, sold };
            }

            function formatSold(sold) {
                if (sold >= 1000) return (sold / 1000).toFixed(1).replace(/\.0$/, '') + 'rb';
                return sold.toString();
            }

            function getRiskLabel(risk) {
                switch(risk.toUpperCase()) {
                    case 'LOW': return '🟢 LOW RISK';
                    case 'MEDIUM': return '🟡 MEDIUM RISK';
                    case 'HIGH': return '🔴 HIGH RISK';
                    default: return '⚪ UNKNOWN';
                }
            }

            function getFilteredGames() {
                let result = games;
                if (state.activeCategory !== 'semua') {
                    result = result.filter(g => g.category.toLowerCase() === state.activeCategory);
                }
                if (state.searchQuery.trim()) {
                    const q = state.searchQuery.trim().toLowerCase();
                    result = result.filter(g =>
                        g.name.toLowerCase().includes(q) ||
                        g.category.toLowerCase().includes(q) ||
                        g.providers.some(p => p.name.toLowerCase().includes(q))
                    );
                }
                return result;
            }

            // ---------- CATEGORY CHIPS ----------
            function getAllCategories() {
                const cats = new Set(games.map(g => g.category));
                return Array.from(cats).sort();
            }

            function renderCategoryChips() {
                const categories = getAllCategories();
                categoryScroll.innerHTML = '';
                const allChip = document.createElement('button');
                allChip.className = 'category-chip' + (state.activeCategory === 'semua' ? ' category-chip--active' : '');
                allChip.textContent = '⚡ Semua';
                allChip.addEventListener('click', () => setActiveCategory('semua'));
                categoryScroll.appendChild(allChip);
                categories.forEach(cat => {
                    const chip = document.createElement('button');
                    chip.className = 'category-chip' + (state.activeCategory === cat.toLowerCase() ? ' category-chip--active' : '');
                    chip.textContent = cat;
                    chip.addEventListener('click', () => setActiveCategory(cat.toLowerCase()));
                    categoryScroll.appendChild(chip);
                });
            }

            function setActiveCategory(cat) {
                state.activeCategory = cat;
                renderCategoryChips();
                renderAllGames();
                updateFilterInfo();
            }

            // ---------- FEATURED ----------
            function renderFeaturedGames() {
                const featured = games.filter(g => g.isFeatured);
                featuredScroll.innerHTML = featured.map(g => {
                    return `
                    <div class="featured-card" onclick="navigateToDetail('${g.id}')">
                        <img src="https://static.wikia.nocookie.net/gensin-impact/images/3/39/Site-community-image/revision/latest/scale-to-width-down/290?cb=20250914064041">
                        <div class="featured-card__content">
                            <span class="featured-card__badge">HOT</span>
                            <span class="featured-card__name">${g.name}</span>
                            <span class="featured-card__meta">${g.providers.length} provider</span>
                        </div>
                    </div>`;
                }).join('');
            }

            // ---------- ALL GAMES ----------
            function renderAllGames() {
                const filtered = getFilteredGames();
                productGrid.innerHTML = '';
                if (filtered.length === 0) {
                    productGrid.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🎮</div><p>Tidak ada game yang cocok.</p></div>`;
                    return;
                }
                filtered.forEach(g => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => navigateToDetail(g.id);
                    card.innerHTML = `
                        <img src="https://picsum.photos/seed/${g.id}/400/250" alt="${g.name}" loading="lazy"
                             onerror="this.style.display='none'">
                        <div class="game-card__content">
                            <span class="game-card__label">${g.category}</span>
                            <h3 class="game-card__name">${g.name}</h3>
                            <div class="game-card__meta">
                                <span class="game-card__cheat-count">${g.providers.length} cheat</span>
                            </div>
                        </div>`;
                    productGrid.appendChild(card);
                });
            }

            function updateFilterInfo() {
                filterCount.textContent = getFilteredGames().length;
            }

            // ---------- NAVIGATION ----------
            function navigateToHome() {
                state.view = 'home';
                viewHome.classList.add('active');
                viewDetail.classList.remove('active');
                detailContent.innerHTML = '';
                window.scrollTo({top:0, behavior:'smooth'});
                renderAllGames();
                updateFilterInfo();
                searchInput.value = state.searchQuery;
                if (state.searchQuery) searchClearBtn.classList.add('visible');
                else searchClearBtn.classList.remove('visible');
            }

            function navigateToDetail(gameId) {
                const game = games.find(g => g.id === gameId);
                if (!game) return;
                state.view = 'detail';
                state.currentGameId = gameId;
                viewHome.classList.remove('active');
                viewDetail.classList.add('active');
                window.scrollTo({top:0, behavior:'smooth'});
                renderDetail(game);
            }

            function renderDetail(game) {
                const providerCards = game.providers.map(p => {
                    const { rating, sold } = generateRatingSold(game.id + p.name);
                    const riskClass = 'badge-' + (p.risk === 'LOW' ? 'low-risk' : p.risk === 'MEDIUM' ? 'medium-risk' : 'high-risk');
                    const riskLabel = getRiskLabel(p.risk);
                    const escapedName = p.name.replace(/'/g, "\\'");
                    return `
                    <div class="provider-card">
                        <span class="badge-work-corner">WORK</span>
                        <img src="https://picsum.photos/seed/prod${encodeURIComponent(p.name)}/400/250" alt="${p.name}" loading="lazy"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22250%22%3E%3Crect width=%22400%22 height=%22250%22 fill=%22%231a1a2e%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23ff2e63%22%3E${p.name}%3C/text%3E%3C/svg%3E';">
                        <div class="provider-card__content">
                            <span class="badge-risk ${riskClass}">${riskLabel}</span>
                            <h3 class="provider-card__name">${p.name}</h3>
                            <p class="provider-card__desc">${p.desc || 'Private cheat provider.'}</p>
                            <div class="provider-meta">
                                <div class="provider-rating">★ ${rating}</div>
                                <div class="provider-sold">🛒 <span>${formatSold(sold)}+</span></div>
                            </div>
                            <button class="btn-order" onclick="handleOrder('${game.id}','${escapedName}')">Lihat Detail</button>
                        </div>
                    </div>`;
                }).join('');

                detailContent.innerHTML = `
                    <div class="detail-hero">
                        <img src="https://picsum.photos/seed/${game.id}/400/250" alt="${game.name}" onerror="this.style.display='none'">
                        <div>
                            <h1>${game.name}</h1>
                            <p class="game-desc">Private cheat untuk ${game.name} – ${game.category}</p>
                        </div>
                    </div>
                    <div class="products-grid">${providerCards}</div>
                `;
            }

            // ---------- HANDLE ORDER ----------
            function handleOrder(gameId, providerName) {
                const game = games.find(g => g.id === gameId);
                if (game) {
                    showToast(`🔰 Provider ${providerName} (${game.name}) dipilih. Hubungi admin.`);
                }
            }

            // ---------- TOAST ----------
            let toastTimer;
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('toast--visible');
                toastTimer = setTimeout(() => toast.classList.remove('toast--visible'), 2800);
            }

            // ---------- EVENT LISTENERS ----------
            searchInput.addEventListener('input', function() {
                state.searchQuery = this.value;
                if (state.searchQuery) searchClearBtn.classList.add('visible');
                else searchClearBtn.classList.remove('visible');
                renderAllGames();
                updateFilterInfo();
            });
            searchClearBtn.addEventListener('click', () => {
                searchInput.value = '';
                state.searchQuery = '';
                searchClearBtn.classList.remove('visible');
                renderAllGames();
                updateFilterInfo();
            });
            document.querySelector('.header__logo').addEventListener('click', (e) => {
                e.preventDefault();
                navigateToHome();
            });

            window.scrollFeatured = function(direction) {
                featuredScroll.scrollBy({ left: direction * 220, behavior: 'smooth' });
            };

            window.navigateToHome = navigateToHome;
            window.navigateToDetail = navigateToDetail;
            window.handleOrder = handleOrder;

            // ---------- INIT ----------
            renderCategoryChips();
            renderFeaturedGames();
            renderAllGames();
            updateFilterInfo();

            console.log('🎮 Ryuhuu Cheats loaded. Total games:', games.length);
        })();
    </script>
