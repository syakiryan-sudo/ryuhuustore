    // ==================== LOCAL STORAGE ====================
    const DEFAULT_KURS = "20000";
    const DEFAULT_LINK = "https://www.ryuhuustore.com/guide";

    function getKurs(kategori) {
      return localStorage.getItem(`kurs_${kategori}`) || DEFAULT_KURS;
    }
    function saveKurs(kategori, value) {
      localStorage.setItem(`kurs_${kategori}`, value);
    }
    function getKeyGuideData(kategori) {
      const saved = localStorage.getItem(`keyguide_${kategori}`);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          return {
            code: data.code || '',
            link: data.link || DEFAULT_LINK
          };
        } catch(e) {}
      }
      return { code: '', link: DEFAULT_LINK };
    }
    function saveKeyGuideData(kategori, data) {
      localStorage.setItem(`keyguide_${kategori}`, JSON.stringify(data));
    }

    function parseUsd(usdString) {
      return parseFloat(usdString.replace('$','').replace(',','.')) || 0;
    }
    function formatIDR(amount) {
      return 'Rp' + Math.round(amount).toLocaleString('id-ID');
    }

      option.value = game;
      option.textContent = game;
      gameFilterSelect.appendChild(option);
    });

        card.className = 'card';

        categorySpan.className = 'category';
        categorySpan.textContent = item.kategori;

          badge.textContent = item.game;
          categorySpan.appendChild(badge);

        headerDiv.appendChild(categorySpan);
        card.appendChild(headerDiv);

          kursInput.value = getKurs(item.kategori);
          kursDiv.appendChild(kursLabel);
          kursDiv.appendChild(kursInput);
        }
        card.appendChild(kursDiv);

        ul.className = 'price-list';

        const isFixed = item.kurs === "Fixed / Manual";

            const kursInput = kursDiv.querySelector('input');
            const kurs = kursInput ? (parseFloat(kursInput.value) || 0) : 0;
            idrSpan.textContent = kurs > 0 ? formatIDR(usdValue * kurs) : 'Rp -';
          }
          
          pricesSpan.appendChild(usdSpan);
          pricesSpan.appendChild(idrSpan);
          li.appendChild(durationSpan);
          li.appendChild(pricesSpan);
          ul.appendChild(li);
        });
        card.appendChild(ul);

        // Tombol Salin Harga
        const btnCopyPrice = document.createElement('button');
        btnCopyPrice.className = 'btn-copy btn-copy-price';
        btnCopyPrice.innerHTML = '📋 Salin Harga';
        btnCopyPrice.addEventListener('click', () => {
          const updatedProduk = [];
          const idrSpans = ul.querySelectorAll('.idr, .idr-value');
          idrSpans.forEach((span, idx) => {
            updatedProduk.push({
              label: item.produk[idx].label,
              usd: item.produk[idx].usd,
              idr: span.textContent
            });
          });
          const tempItem = { ...item, produk: updatedProduk };
          const priceText = buildPriceTemplate(tempItem);
          copyToClipboard(priceText, btnCopyPrice, '📋 Salin Harga');
        });
        card.appendChild(btnCopyPrice);

        // Event listener kurs jika bukan fixed
        if (!isFixed) {
          const kursInput = kursDiv.querySelector('input');
          kursInput.addEventListener('input', function() {
            const kurs = parseFloat(this.value) || 0;
            saveKurs(item.kategori, this.value);
            const idrSpans = ul.querySelectorAll('.idr-value');
            idrSpans.forEach(span => {
              const usd = parseFloat(span.dataset.usd);
              span.textContent = kurs > 0 ? formatIDR(usd * kurs) : 'Rp -';
            });
          });
        }

        // Divider
        const divider = document.createElement('hr');
        divider.className = 'divider';
        card.appendChild(divider);

        // Key & Guide Section
        const keySection = document.createElement('div');
        keySection.className = 'key-guide-section';

        const keyLabel = document.createElement('div');
        keyLabel.className = 'key-guide-label';
        keyLabel.textContent = '🔑 Invite Code & Guide';
        keySection.appendChild(keyLabel);

        const savedData = getKeyGuideData(item.kategori);

        // Input Kode
        const rowCode = document.createElement('div');
        rowCode.className = 'input-row';
        rowCode.innerHTML = '<label>Kode</label>';
        const inputCode = document.createElement('input');
        inputCode.type = 'text';
        inputCode.value = savedData.code;
        inputCode.addEventListener('input', () => {
          savedData.code = inputCode.value;
          saveKeyGuideData(item.kategori, savedData);
        });
        rowCode.appendChild(inputCode);
        keySection.appendChild(rowCode);

        // Input Link
        const rowLink = document.createElement('div');
        rowLink.className = 'input-row';
        rowLink.innerHTML = '<label>Link</label>';
        const inputLink = document.createElement('input');
        inputLink.type = 'text';
        inputLink.value = savedData.link;
        inputLink.addEventListener('input', () => {
          savedData.link = inputLink.value;
          saveKeyGuideData(item.kategori, savedData);
        });
        rowLink.appendChild(inputLink);
        keySection.appendChild(rowLink);

        // Tombol Salin Kode
        const btnCopyKey = document.createElement('button');
        btnCopyKey.className = 'btn-copy';
        btnCopyKey.innerHTML = '📋 Salin Kode';
        btnCopyKey.addEventListener('click', () => {
          const keyText = buildKeyTemplate(item.kategori, savedData.code, savedData.link);
          if (!savedData.code && !savedData.link) {
            alert('Isi dulu kode atau link!');
            return;
          }
          copyToClipboard(keyText, btnCopyKey, '📋 Salin Kode');
        });
        keySection.appendChild(btnCopyKey);

        card.appendChild(keySection);
        productGrid.appendChild(card);
      });
    }

    // ==================== TEMPLATE BUILDER ====================
    function buildPriceTemplate(item) {
      let lines = [];
      let title = `## 🛒 **${item.kategori}**`;
      if (item.game) title += ` - ${item.game}`;
      lines.push(title);
      lines.push('');
      item.produk.forEach(p => {
        lines.push(`- **${p.label}:** ${p.usd} / ${p.idr}`);
      });
      return lines.join('\n');
    }

    function buildKeyTemplate(kategori, code, link) {
      return `## ⚔️ **${kategori} Code**\n\`\`\`\n${code}\n\`\`\`\n${link}`;
    }

    // ==================== UTILS ====================
    function copyToClipboard(text, button, originalHTML) {
      navigator.clipboard.writeText(text).then(() => {
        button.innerHTML = '✅ Tersalin!';
        button.disabled = true;
        setTimeout(() => {
          button.innerHTML = originalHTML;
          button.disabled = false;
        }, 2000);
      }).catch(err => {
        alert('Gagal menyalin, coba lagi.');
        console.error(err);
      });
    }

    // ==================== EVENT LISTENER FILTER ====================
    gameFilterSelect.addEventListener('change', (e) => {
      renderProducts(e.target.value);
    });

    // Render awal
    renderProducts('all');
  </script>
</body>
</html>
